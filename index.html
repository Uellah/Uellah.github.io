<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Приглашение на свидание</title>
  <style>
    :root {
      --bg-deep: #0f0a1a;
      --bg-mid: #1a1230;
      --accent: #f2a8be;
      --accent-strong: #e87898;
      --accent-soft: #c9a0dc;
      --accent-glow: rgba(242, 168, 190, 0.4);
      --text: #f5eef5;
      --text-muted: #b8a8c4;
      --card-bg: rgba(28, 20, 44, 0.92);
      --card-border: rgba(242, 168, 190, 0.22);
      --input-bg: rgba(255, 255, 255, 0.07);
      --input-border: rgba(255, 255, 255, 0.16);
      --radius: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 45%, #251a3d 100%);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.55;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .bg-glow--1 { top: -20%; left: -10%; background: radial-gradient(circle, #6b3a7a 0%, transparent 70%); }
    .bg-glow--2 { bottom: -25%; right: -15%; background: radial-gradient(circle, #3d2a5c 0%, transparent 70%); animation-delay: -6s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(5%, 8%) scale(1.08); }
    }

    .stars { position: absolute; inset: 0; }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.85; }
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 1rem;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 540px;
      animation: fadeIn 0.45s ease;
    }

    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2rem 2rem 1.75rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    /* Декоративная «картинка» — CSS, без внешних ссылок */
    .card__art {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card__art--stars {
      background: linear-gradient(155deg, #0a1535 0%, #152050 42%, #2d1f55 78%, #4a2870 100%);
    }

    .card__art--stars::before {
      content: "";
      position: absolute;
      width: 2px;
      height: 2px;
      top: 10%;
      left: 12%;
      border-radius: 50%;
      background: #fff;
      animation: starPulse 2.8s ease-in-out infinite;
      box-shadow:
        6px 4px 0 0 rgba(255,255,255,0.55),
        14px 10px 0 1px rgba(255,255,255,0.85),
        22px 3px 0 0 rgba(255,255,255,0.7),
        30px 16px 0 0 rgba(255,255,255,0.5),
        38px 8px 0 1px rgba(255,255,255,0.9),
        4px 20px 0 0 rgba(255,255,255,0.65),
        12px 28px 0 1px rgba(255,255,255,0.45),
        20px 34px 0 0 rgba(255,255,255,0.75),
        28px 24px 0 0 rgba(255,255,255,0.6),
        36px 32px 0 1px rgba(255,255,255,0.8),
        44px 14px 0 0 rgba(255,255,255,0.55),
        50px 26px 0 0 rgba(255,255,255,0.7),
        8px 44px 0 1px rgba(255,255,255,0.5),
        18px 50px 0 0 rgba(255,255,255,0.65),
        32px 46px 0 0 rgba(255,255,255,0.4),
        46px 40px 0 1px rgba(255,255,255,0.85),
        54px 6px 0 0 rgba(255,255,255,0.6),
        56px 48px 0 0 rgba(255,255,255,0.55),
        2px 58px 0 1px rgba(255,255,255,0.7),
        42px 56px 0 0 rgba(255,255,255,0.45);
    }

    .card__art--stars::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      bottom: 14%;
      right: 10%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #fff9e8, #f5d070 52%, #c89030 100%);
      box-shadow:
        0 0 20px rgba(255, 215, 100, 0.75),
        0 0 40px rgba(255, 190, 60, 0.35);
      animation: moonPulse 3.2s ease-in-out infinite;
    }

    @keyframes starPulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    @keyframes moonPulse {
      0%, 100% {
        opacity: 0.82;
        box-shadow: 0 0 18px rgba(255, 215, 100, 0.65), 0 0 36px rgba(255, 190, 60, 0.28);
      }
      50% {
        opacity: 1;
        box-shadow: 0 0 26px rgba(255, 225, 130, 0.9), 0 0 50px rgba(255, 200, 70, 0.45);
      }
    }

    .card__art--night {
      background: linear-gradient(180deg, #080f22 0%, #142040 38%, #2a2858 72%, #4a3270 100%);
    }

    .card__art--night::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      top: 12%;
      right: 16%;
      border-radius: 50%;
      background: radial-gradient(circle at 36% 36%, #fffef0, #f0e8b8 55%, #b8a060 100%);
      box-shadow:
        0 0 18px rgba(255, 245, 210, 0.7),
        0 0 32px rgba(255, 220, 150, 0.35);
      z-index: 2;
    }

    .card__art--night::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 42%;
      background: #070a14;
      clip-path: polygon(
        0% 100%, 0% 52%,
        6% 52%, 6% 28%, 12% 28%, 12% 58%,
        18% 58%, 18% 18%, 24% 18%, 24% 62%,
        32% 62%, 32% 34%, 38% 34%, 38% 72%,
        46% 72%, 46% 22%, 52% 22%, 52% 48%,
        58% 48%, 58% 14%, 64% 14%, 64% 55%,
        72% 55%, 72% 30%, 78% 30%, 78% 68%,
        86% 68%, 86% 20%, 92% 20%, 92% 50%,
        100% 50%, 100% 100%
      );
      border-radius: 2px 2px 0 0;
    }

    .card__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .card__top--solo { justify-content: flex-start; }

    h1 {
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.65rem;
      color: var(--text);
    }

    h2 {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .lead {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .question-text {
      font-size: 1.3rem;
      text-align: center;
      margin: 0.5rem 0 1.75rem;
      color: var(--text);
      line-height: 1.45;
    }

    /* Кнопки */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.98); }

    .btn--primary {
      width: 100%;
      background: linear-gradient(135deg, #f8b4c8 0%, #d898e8 100%);
      color: #1e0a28;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        0 6px 24px rgba(232, 120, 160, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .btn--primary:hover {
      filter: brightness(1.06);
      box-shadow: 0 8px 30px rgba(232, 120, 160, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .btn--secondary {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .btn--secondary:hover { background: rgba(255, 255, 255, 0.14); }

    .btn--back {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0.25rem 0;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .btn--back:hover { color: var(--text); }

    .question-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .btn--yes { width: 100%; }

    .btn--no {
      width: 100%;
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .btn--no.is-fleeing {
      position: fixed;
      z-index: 1000;
      pointer-events: auto;
      transition: left 0.12s ease, top 0.12s ease;
    }

    .no-slot {
      min-height: 48px;
    }

    .no-message {
      display: none;
      text-align: center;
      color: var(--accent);
      font-size: 0.92rem;
      margin-top: 1rem;
      padding: 0.7rem 0.9rem;
      background: rgba(242, 168, 190, 0.1);
      border-radius: 12px;
    }

    .no-message.visible { display: block; }

    /* Форма */
    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .option-grid--wide { grid-template-columns: 1fr; }

    @media (min-width: 400px) {
      .option-grid--wide { grid-template-columns: repeat(2, 1fr); }
    }

    .option-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn:hover {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(242, 168, 190, 0.35);
    }

    .option-btn.selected {
      background: rgba(242, 168, 190, 0.18);
      border-color: var(--accent);
      color: #ffd8e4;
      box-shadow: 0 0 0 1px rgba(242, 168, 190, 0.3);
    }

    .option-art {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .option-art::before,
    .option-art::after {
      content: "";
      position: absolute;
    }

    /* Погулять / Парк */
    .art--walk,
    .art--park {
      background: linear-gradient(180deg, #1a1230 0%, #1a2840 50%, #2a5038 100%);
    }

    .art--walk::before,
    .art--park::before {
      width: 4px;
      height: 16px;
      bottom: 10px;
      left: 14px;
      background: #3d2818;
      border-radius: 1px;
      box-shadow:
        -4px -14px 0 7px #4a8a50,
        -2px -10px 0 5px #3d7040,
        26px 0 0 0 #3d2818,
        22px -12px 0 8px #4a8a50,
        24px -8px 0 6px #3d7040;
    }

    .art--walk::after,
    .art--park::after {
      width: 11px;
      height: 11px;
      top: 9px;
      right: 11px;
      border-radius: 50%;
      background: #ffe880;
      box-shadow: 0 0 12px rgba(255, 232, 128, 0.65);
    }

    /* Кино */
    .art--cinema {
      background: #08080c;
    }

    .art--cinema::before {
      inset: 8px;
      background: #1c1c24;
      border-radius: 6px;
      border: 1px solid #2a2a34;
    }

    .art--cinema::after {
      top: 50%;
      left: 50%;
      transform: translate(-30%, -50%);
      border-style: solid;
      border-width: 9px 0 9px 15px;
      border-color: transparent transparent transparent #f2a8be;
      filter: drop-shadow(0 0 8px rgba(242, 168, 190, 0.7));
    }

    /* Центр */
    .art--center {
      background: linear-gradient(180deg, #1a1230 0%, #1e2850 70%, #2a3060 100%);
    }

    .art--center::before {
      width: 11px;
      height: 26px;
      bottom: 8px;
      left: 11px;
      background: #12182a;
      box-shadow:
        3px 6px 0 0 #ffe880,
        7px 10px 0 0 rgba(255, 232, 128, 0.45),
        18px -4px 0 0 #161e34,
        18px -4px 0 0 #161e34,
        21px 2px 0 0 #ffe880,
        25px 6px 0 0 rgba(255, 232, 128, 0.4),
        34px 4px 0 0 #12182a,
        37px 8px 0 0 #ffe880,
        41px 12px 0 0 rgba(255, 232, 128, 0.35),
        46px -2px 0 0 #1a2240;
    }

    .art--center::after {
      width: 10px;
      height: 10px;
      top: 8px;
      right: 10px;
      border-radius: 50%;
      background: #ffe880;
      box-shadow: 0 0 10px rgba(255, 232, 128, 0.55);
    }

    /* На районе */
    .art--local {
      background: linear-gradient(180deg, #1a1230 0%, #2a1848 100%);
    }

    .art--local::before {
      width: 10px;
      height: 18px;
      bottom: 10px;
      left: 12px;
      background: #1a1430;
      box-shadow:
        14px 4px 0 0 #221838,
        28px 6px 0 0 #1a1430,
        6px 8px 0 0 rgba(255, 232, 128, 0.35),
        20px 12px 0 0 rgba(255, 232, 128, 0.3),
        34px 10px 0 0 rgba(255, 232, 128, 0.25);
    }

    .art--local::after {
      width: 2px;
      height: 18px;
      bottom: 10px;
      right: 18px;
      background: #888;
      box-shadow:
        0 -20px 0 5px rgba(255, 232, 128, 0.5),
        0 -20px 0 8px rgba(255, 232, 128, 0.15);
    }

    /* Выберем вместе */
    .art--together {
      background: #12101a;
    }

    .art--together::before {
      width: 10px;
      height: 10px;
      top: 50%;
      left: 36%;
      transform: translate(-50%, -50%) rotate(-45deg);
      background: #f2a8be;
      border-radius: 50% 50% 0 50%;
      box-shadow: 14px -14px 0 0 #c9a0dc;
    }

    .art--together::after {
      width: 6px;
      height: 6px;
      top: 38%;
      left: 30%;
      border-radius: 50%;
      background: #f2a8be;
      box-shadow: 20px 0 0 0 #c9a0dc, 10px -8px 0 0 #f2a8be, 24px -8px 0 0 #c9a0dc;
    }

    /* Мелодрама */
    .art--romance {
      background: linear-gradient(180deg, #2a1020 0%, #1a1230 100%);
    }

    .art--romance::before {
      width: 14px;
      height: 14px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%) rotate(-45deg);
      background: #e87898;
      border-radius: 50% 50% 0 50%;
      box-shadow:
        0 8px 16px rgba(232, 120, 152, 0.45),
        10px -10px 0 0 #e87898,
        5px -15px 0 0 #e87898;
    }

    /* Комедия */
    .art--comedy {
      background: linear-gradient(180deg, #1a1230 0%, #1a2850 100%);
    }

    .art--comedy::before {
      width: 34px;
      height: 34px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      border-radius: 50%;
      background: #ffe880;
      box-shadow:
        -8px -6px 0 0 #1a1230,
        8px -6px 0 0 #1a1230;
    }

    .art--comedy::after {
      width: 14px;
      height: 7px;
      bottom: 19px;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid #1a1230;
      border-top: none;
      border-radius: 0 0 14px 14px;
      background: transparent;
    }

    /* Ужасы */
    .art--horror {
      background: #060608;
    }

    .art--horror::before {
      width: 18px;
      height: 18px;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #c0c8e0;
      box-shadow: 0 0 20px rgba(192, 200, 224, 0.35), 0 0 40px rgba(192, 200, 224, 0.15);
    }

    .art--horror::after {
      width: 3px;
      height: 22px;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a22;
      box-shadow:
        -10px -8px 0 0 #141418,
        -6px -14px 0 0 #141418,
        8px -10px 0 0 #141418,
        12px -6px 0 0 #141418,
        -14px 2px 0 0 #141418,
        14px 0 0 0 #141418;
    }

    /* Фантастика */
    .art--scifi {
      background: radial-gradient(ellipse at 50% 80%, #2a1848 0%, #1a1230 50%, #080810 100%);
    }

    .art--scifi::before {
      width: 28px;
      height: 10px;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #6a80c0;
      box-shadow:
        0 -8px 0 4px rgba(106, 128, 192, 0.5),
        0 6px 12px rgba(106, 128, 192, 0.4);
    }

    .art--scifi::after {
      width: 2px;
      height: 2px;
      top: 12px;
      left: 14px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow:
        10px 4px 0 0 rgba(255, 255, 255, 0.7),
        22px 2px 0 1px rgba(255, 255, 255, 0.8),
        36px 8px 0 0 rgba(255, 255, 255, 0.6),
        44px 14px 0 0 rgba(255, 255, 255, 0.75),
        18px 16px 0 0 rgba(255, 255, 255, 0.55);
    }

    /* Уютное */
    .art--cozy {
      background: linear-gradient(180deg, #2a1810 0%, #1a1230 100%);
    }

    .art--cozy::before {
      width: 14px;
      height: 22px;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #ffe880 0%, #f2a8be 100%);
      border-radius: 2px 2px 4px 4px;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2);
    }

    .art--cozy::after {
      width: 8px;
      height: 8px;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(255, 200, 80, 0.9);
      box-shadow: 0 0 24px rgba(255, 140, 40, 0.45), 0 0 40px rgba(255, 100, 30, 0.2);
    }

    /* Кофе */
    .art--coffee {
      background: linear-gradient(180deg, #2a1818 0%, #1a1230 100%);
    }

    .art--coffee::before {
      width: 24px;
      height: 18px;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1230;
      border: 2px solid #c9a0dc;
      border-top: none;
      border-radius: 0 0 10px 10px;
      box-shadow: inset 0 2px 0 rgba(242, 168, 190, 0.3);
    }

    .art--coffee::after {
      width: 4px;
      height: 4px;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      box-shadow:
        -7px 3px 0 2px rgba(255, 255, 255, 0.2),
        7px 3px 0 2px rgba(255, 255, 255, 0.18),
        0 -6px 0 1px rgba(255, 255, 255, 0.15);
    }

    /* Пикник */
    .art--picnic {
      background: linear-gradient(180deg, #1a2840 0%, #2a5038 100%);
    }

    .art--picnic::before {
      width: 38px;
      height: 18px;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: #8a4030;
      border-radius: 3px;
      box-shadow:
        0 0 0 2px #6a3020,
        6px 0 0 0 #a05040,
        12px 0 0 0 #8a4030,
        18px 0 0 0 #a05040,
        24px 0 0 0 #8a4030,
        30px 0 0 0 #a05040,
        0 6px 0 0 #6a3020,
        6px 6px 0 0 #8a4030,
        12px 6px 0 0 #a05040,
        18px 6px 0 0 #8a4030,
        24px 6px 0 0 #a05040,
        30px 6px 0 0 #8a4030;
    }

    .art--picnic::after {
      width: 14px;
      height: 10px;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #4a8a50;
      border-radius: 50% 50% 0 0;
      box-shadow: -8px 2px 0 0 #3d7040, 8px 2px 0 0 #3d7040;
    }

    .form-group { margin-bottom: 1.15rem; }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.45rem;
    }

    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      resize: vertical;
      min-height: 80px;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Дата */
    .date-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.35rem;
    }

    .date-row__sep { color: var(--text-muted); font-weight: 500; }

    .field-input {
      width: 100%;
      padding: 0.75rem 0.5rem;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
    }

    .field-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field-input::placeholder { color: rgba(184, 168, 196, 0.5); }

    /* Время — кастомный степпер */
    .time-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 14px;
    }

    .time-unit { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }

    .time-unit__btn {
      width: 36px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .time-unit__btn:hover {
      background: rgba(242, 168, 190, 0.2);
      color: var(--text);
    }

    .time-unit__value {
      font-size: 1.6rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 2.4ch;
      text-align: center;
      color: var(--text);
    }

    .time-sep {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0;
      align-self: center;
      padding-top: 0.2rem;
    }

    .form-error {
      color: #f0a0a0;
      font-size: 0.85rem;
      margin: 0.5rem 0 0;
      display: none;
    }

    .form-error.visible { display: block; }

    .nav-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    .nav-row .btn--primary { flex: 1; width: auto; }

    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active { background: var(--accent); transform: scale(1.3); }

    /* Финал */
    .summary {
      background: rgba(0, 0, 0, 0.22);
      border-radius: 14px;
      padding: 1.1rem 1.2rem;
      margin: 1rem 0 1.25rem;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.95rem;
    }

    .summary-item:last-child { border-bottom: none; }
    .summary-item__label { color: var(--text-muted); flex-shrink: 0; }
    .summary-item__value { text-align: right; color: var(--text); }

    .final-actions {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      font-size: 0.9rem;
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      z-index: 2000;
      pointer-events: none;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Конфетти */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      will-change: transform, opacity;
      animation: confetti-burst var(--confetti-dur, 1.2s) ease-out var(--confetti-delay, 0s) forwards;
    }

    @keyframes confetti-burst {
      0% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--confetti-x, 0), var(--confetti-y, 0)) rotate(var(--confetti-rot, 360deg));
        opacity: 0;
      }
    }

    @media (max-width: 400px) {
      .card { padding: 1.5rem 1.25rem 1.35rem; }
      h1 { font-size: 1.5rem; }
      .option-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>
    <div class="stars" id="stars"></div>
  </div>

  <main class="app">
    <!-- Экран 1 -->
    <section class="screen active" id="screen-welcome">
      <div class="card">
        <div class="card__art card__art--stars" aria-hidden="true"></div>
        <h1>Привет, Сашулик!</h1>
        <p class="lead">Я тут немного увлёкся и сделал целый сайт, чтобы задать один вопрос.</p>
        <button type="button" class="btn btn--primary" id="btn-next-welcome">Дальше</button>
      </div>
    </section>

    <!-- Экран 2 -->
    <section class="screen" id="screen-question">
      <div class="card">
        <div class="card__top">
          <button type="button" class="btn--back" id="btn-back-question">← Назад</button>
        </div>
        <p class="question-text">Пойдёшь со мной на свидание?</p>
        <div class="question-actions">
          <button type="button" class="btn btn--primary btn--yes" id="btn-yes">Да</button>
          <div class="no-slot" id="no-slot">
            <button type="button" class="btn btn--no" id="btn-no">Нет</button>
          </div>
        </div>
        <p class="no-message" id="no-message">Хмм, кажется, сайт не принимает такой ответ</p>
      </div>
    </section>

    <!-- Экран 3 -->
    <section class="screen" id="screen-form">
      <div class="card">
        <div class="card__top">
          <button type="button" class="btn--back" id="btn-form-back">← Назад</button>
        </div>
        <div class="progress-dots" id="form-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <h2>Давай спланируем</h2>

        <form id="plan-form" novalidate>
          <div class="form-step" id="form-step-format">
            <span class="form-label">Формат</span>
            <div class="option-grid" data-field="format">
              <button type="button" class="option-btn" data-value="walk">
                <div class="option-art art--walk" aria-hidden="true"></div>
                Погулять
              </button>
              <button type="button" class="option-btn" data-value="cinema">
                <div class="option-art art--cinema" aria-hidden="true"></div>
                Кино
              </button>
              <button type="button" class="option-btn" data-value="coffee">
                <div class="option-art art--coffee" aria-hidden="true"></div>
                Кофе
              </button>
              <button type="button" class="option-btn" data-value="picnic">
                <div class="option-art art--picnic" aria-hidden="true"></div>
                Пикник
              </button>
            </div>
          </div>

          <div class="form-step" id="form-step-details" style="display:none;">
            <div class="sub-options" id="sub-walk" style="display:none;">
              <span class="form-label">Куда пойдём</span>
              <div class="option-grid option-grid--wide" data-field="place">
                <button type="button" class="option-btn" data-value="park">
                  <div class="option-art art--park" aria-hidden="true"></div>
                  Парк
                </button>
                <button type="button" class="option-btn" data-value="center">
                  <div class="option-art art--center" aria-hidden="true"></div>
                  Центр
                </button>
                <button type="button" class="option-btn" data-value="local">
                  <div class="option-art art--local" aria-hidden="true"></div>
                  На районе
                </button>
                <button type="button" class="option-btn" data-value="together">
                  <div class="option-art art--together" aria-hidden="true"></div>
                  Выберем вместе
                </button>
              </div>
            </div>
            <div class="sub-options" id="sub-cinema" style="display:none;">
              <span class="form-label">Жанр</span>
              <div class="option-grid option-grid--wide" data-field="genre">
                <button type="button" class="option-btn" data-value="comedy">
                  <div class="option-art art--comedy" aria-hidden="true"></div>
                  Комедия
                </button>
                <button type="button" class="option-btn" data-value="romance">
                  <div class="option-art art--romance" aria-hidden="true"></div>
                  Мелодрама
                </button>
                <button type="button" class="option-btn" data-value="horror">
                  <div class="option-art art--horror" aria-hidden="true"></div>
                  Ужасы
                </button>
                <button type="button" class="option-btn" data-value="scifi">
                  <div class="option-art art--scifi" aria-hidden="true"></div>
                  Фантастика
                </button>
                <button type="button" class="option-btn" data-value="cozy">
                  <div class="option-art art--cozy" aria-hidden="true"></div>
                  Что-нибудь уютное
                </button>
                <button type="button" class="option-btn" data-value="together">
                  <div class="option-art art--together" aria-hidden="true"></div>
                  Выберем вместе
                </button>
              </div>
            </div>
          </div>

          <div class="form-step" id="form-step-datetime" style="display:none;">
            <div class="form-group">
              <label>Удобная дата</label>
              <div class="date-row">
                <input class="field-input" type="text" inputmode="numeric" id="date-day" placeholder="ДД" maxlength="2" aria-label="День">
                <span class="date-row__sep">.</span>
                <input class="field-input" type="text" inputmode="numeric" id="date-month" placeholder="ММ" maxlength="2" aria-label="Месяц">
              </div>
            </div>
            <div class="form-group">
              <label>Удобное время</label>
              <div class="time-picker">
                <div class="time-unit">
                  <button type="button" class="time-unit__btn" data-unit="hour" data-dir="1" aria-label="Час вверх">▲</button>
                  <span class="time-unit__value" id="hour-display">19</span>
                  <button type="button" class="time-unit__btn" data-unit="hour" data-dir="-1" aria-label="Час вниз">▼</button>
                </div>
                <span class="time-sep">:</span>
                <div class="time-unit">
                  <button type="button" class="time-unit__btn" data-unit="minute" data-dir="1" aria-label="Минуты вверх">▲</button>
                  <span class="time-unit__value" id="minute-display">00</span>
                  <button type="button" class="time-unit__btn" data-unit="minute" data-dir="-1" aria-label="Минуты вниз">▼</button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label for="input-comment">Комментарий <span style="opacity:0.55;">(необязательно)</span></label>
              <textarea id="input-comment" placeholder="Например: без слишком позднего вечера"></textarea>
            </div>
          </div>

          <p class="form-error" id="form-error"></p>
          <div class="nav-row">
            <button type="button" class="btn btn--primary" id="btn-form-next">Дальше</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Экран 4 -->
    <section class="screen" id="screen-final">
      <div class="card">
        <div class="card__art card__art--night" aria-hidden="true"></div>
        <h1>Ура, договорились!</h1>
        <div class="summary" id="summary"></div>
        <div class="final-actions">
          <button type="button" class="btn btn--primary" id="btn-copy">Скопировать ответ</button>
          <button type="button" class="btn btn--secondary" id="btn-reset">Начать заново</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const SUBMIT_URL = "";
    const STORAGE_KEY = "date-invite-response";

    const LABELS = {
      format: { walk: "Погулять", cinema: "Кино", coffee: "Кофе", picnic: "Пикник" },
      place: { park: "Парк", center: "Центр", local: "На районе", together: "Выберем вместе" },
      genre: { comedy: "Комедия", romance: "Мелодрама", horror: "Ужасы", scifi: "Фантастика", cozy: "Что-нибудь уютное", together: "Выберем вместе" }
    };

    const state = { format: null, place: null, genre: null, date: "", time: "", comment: "" };
    let formSubStep = 0;

    const FORMATS_WITH_PLACE = ["walk"];
    const FORMATS_WITH_GENRE = ["cinema"];
    const FORMATS_NO_DETAILS = ["coffee", "picnic"];

    function formatNeedsDetails() {
      return FORMATS_WITH_PLACE.includes(state.format) || FORMATS_WITH_GENRE.includes(state.format);
    }

    let timeHour = 19;
    let timeMinute = 0;
    let noFleeing = false;
    let noFleeEnabled = false;
    let noFleeTimer = null;

    const screens = {
      welcome: document.getElementById("screen-welcome"),
      question: document.getElementById("screen-question"),
      form: document.getElementById("screen-form"),
      final: document.getElementById("screen-final")
    };

    const btnNo = document.getElementById("btn-no");
    const noSlot = document.getElementById("no-slot");
    const noMessage = document.getElementById("no-message");
    const formDots = document.getElementById("form-dots");
    const formError = document.getElementById("form-error");
    const toast = document.getElementById("toast");
    const hourDisplay = document.getElementById("hour-display");
    const minuteDisplay = document.getElementById("minute-display");

    function initBackground() {
      const starsEl = document.getElementById("stars");
      for (let i = 0; i < 50; i++) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.setProperty("--dur", (2 + Math.random() * 4) + "s");
        star.style.setProperty("--delay", Math.random() * 5 + "s");
        starsEl.appendChild(star);
      }
    }

    function pad2(n) { return String(n).padStart(2, "0"); }

    function updateTimeDisplay() {
      hourDisplay.textContent = pad2(timeHour);
      minuteDisplay.textContent = pad2(timeMinute);
    }

    function initTimePicker() {
      updateTimeDisplay();
      document.querySelectorAll(".time-unit__btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const unit = btn.dataset.unit;
          const dir = Number(btn.dataset.dir);
          if (unit === "hour") {
            timeHour = (timeHour + dir + 24) % 24;
          } else {
            timeMinute = (timeMinute + dir * 5 + 60) % 60;
          }
          updateTimeDisplay();
        });
      });
    }

    function getSelectedTime() {
      return `${pad2(timeHour)}:${pad2(timeMinute)}`;
    }

    function getSelectedDate() {
      const d = document.getElementById("date-day").value.trim();
      const m = document.getElementById("date-month").value.trim();
      if (!d || !m) return "";
      const y = new Date().getFullYear();
      return `${y}-${pad2(Number(m))}-${pad2(Number(d))}`;
    }

    function setDateFields(isoDate) {
      if (!isoDate) return;
      const [, m, d] = isoDate.split("-");
      document.getElementById("date-day").value = d;
      document.getElementById("date-month").value = m;
    }

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove("active"));
      screens[name].classList.add("active");
      if (name === "question") {
        resetNoButton();
        armNoFleeing();
      } else {
        disarmNoFleeing();
        resetNoButton();
      }
    }

    function armNoFleeing() {
      noFleeEnabled = false;
      clearTimeout(noFleeTimer);
      // Небольшая пауза после перехода — чтобы кнопка не убегала от курсора после клика «Дальше»
      noFleeTimer = setTimeout(() => {
        noFleeEnabled = screens.question.classList.contains("active");
      }, 600);
    }

    function disarmNoFleeing() {
      noFleeEnabled = false;
      clearTimeout(noFleeTimer);
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("visible");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("visible"), 2500);
    }

    function getSafeInsets() {
      const probe = document.createElement("div");
      probe.style.cssText = [
        "position:fixed",
        "top:0", "left:0",
        "padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)",
        "visibility:hidden",
        "pointer-events:none"
      ].join(";");
      document.body.appendChild(probe);
      const cs = getComputedStyle(probe);
      const insets = {
        top: parseFloat(cs.paddingTop) || 0,
        right: parseFloat(cs.paddingRight) || 0,
        bottom: parseFloat(cs.paddingBottom) || 0,
        left: parseFloat(cs.paddingLeft) || 0
      };
      document.body.removeChild(probe);
      return insets;
    }

    // «Нет» убегает по всему экрану
    function activateNoFleeing() {
      if (noFleeing) return;
      const rect = btnNo.getBoundingClientRect();
      noFleeing = true;
      btnNo.classList.add("is-fleeing");
      document.body.appendChild(btnNo);
      // Сохраняем размер, чтобы кнопка не сжималась при переходе в fixed
      btnNo.style.width = rect.width + "px";
      btnNo.style.height = rect.height + "px";
      btnNo.style.left = rect.left + "px";
      btnNo.style.top = rect.top + "px";
    }

    function resetNoButton() {
      noFleeing = false;
      btnNo.classList.remove("is-fleeing");
      btnNo.style.left = "";
      btnNo.style.top = "";
      btnNo.style.width = "";
      btnNo.style.height = "";
      noSlot.appendChild(btnNo);
    }

    function getNoButtonCenter() {
      const rect = btnNo.getBoundingClientRect();
      return {
        cx: rect.left + rect.width / 2,
        cy: rect.top + rect.height / 2,
        w: rect.width,
        h: rect.height
      };
    }

    function isNearNoButton(clientX, clientY, threshold) {
      const { cx, cy } = getNoButtonCenter();
      return Math.hypot(clientX - cx, clientY - cy) < threshold;
    }

    function fleeToRandom(clientX, clientY, minDist) {
      const safe = getSafeInsets();
      const pad = 10;
      const w = btnNo.offsetWidth;
      const h = btnNo.offsetHeight;
      const minX = safe.left + pad;
      const minY = safe.top + pad;
      const maxX = Math.max(window.innerWidth - w - safe.right - pad, minX);
      const maxY = Math.max(window.innerHeight - h - safe.bottom - pad, minY);

      let nx = minX + Math.random() * (maxX - minX);
      let ny = minY + Math.random() * (maxY - minY);

      if (clientX != null && clientY != null) {
        const avoidDist = minDist ?? 110;
        for (let i = 0; i < 20; i++) {
          nx = minX + Math.random() * (maxX - minX);
          ny = minY + Math.random() * (maxY - minY);
          if (Math.hypot(nx + w / 2 - clientX, ny + h / 2 - clientY) > avoidDist) break;
        }
      }

      btnNo.style.left = nx + "px";
      btnNo.style.top = ny + "px";
    }

    function moveNoButton(clientX, clientY, opts = {}) {
      if (!screens.question.classList.contains("active") || !noFleeEnabled) return;

      const isTouch = opts.isTouch === true;
      const approachThreshold = isTouch ? 80 : (noFleeing ? 130 : 100);
      const fleeDist = isTouch ? 70 : 110;
      const near = isNearNoButton(clientX, clientY, approachThreshold);

      if (!noFleeing) {
        if (!near) return;
        activateNoFleeing();
      }

      if (near) {
        fleeToRandom(clientX, clientY, fleeDist);
      }
    }

    function handleNoTap() {
      if (!noFleeEnabled) return;
      noMessage.classList.add("visible");
      if (!noFleeing) activateNoFleeing();
      fleeToRandom(null, null);
    }

    function initNoButton() {
      document.addEventListener("mousemove", e => moveNoButton(e.clientX, e.clientY));

      document.addEventListener("touchmove", e => {
        const t = e.touches[0];
        if (t) moveNoButton(t.clientX, t.clientY, { isTouch: true });
      }, { passive: true });

      btnNo.addEventListener("mouseenter", () => {
        if (!noFleeEnabled) return;
        activateNoFleeing();
        fleeToRandom(null, null);
      });

      btnNo.addEventListener("click", e => {
        e.preventDefault();
        handleNoTap();
      });

      // На мобиле: tap — сразу убегает, не даём нажать
      btnNo.addEventListener("touchstart", e => {
        if (!noFleeEnabled) return;
        e.preventDefault();
        handleNoTap();
      }, { passive: false });
    }

    // Конфетти при «Да»
    const CONFETTI_COLORS = ["#f2a8be", "#c9a0dc", "#ffe8a0", "#a8d8f2", "#ffffff"];

    function launchConfetti(sourceBtn) {
      const rect = sourceBtn.getBoundingClientRect();
      const originX = rect.left + rect.width / 2;
      const originY = rect.top + rect.height / 2;
      const count = 60 + Math.floor(Math.random() * 21);

      for (let i = 0; i < count; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        const size = 6 + Math.random() * 8;
        const isCircle = Math.random() > 0.5;
        const dur = 1 + Math.random() * 0.4;
        const delay = Math.random() * 0.3;
        const tx = (Math.random() - 0.5) * 400;
        const ty = -50 + Math.random() * -250;
        const rot = Math.random() * 720;

        piece.style.cssText = [
          `left:${originX - size / 2}px`,
          `top:${originY - size / 2}px`,
          `width:${size}px`,
          `height:${size}px`,
          `background:${CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)]}`,
          `border-radius:${isCircle ? "50%" : "0"}`,
          `--confetti-x:${tx}px`,
          `--confetti-y:${ty}px`,
          `--confetti-rot:${rot}deg`,
          `--confetti-dur:${dur}s`,
          `--confetti-delay:${delay}s`
        ].join(";");

        document.body.appendChild(piece);
        piece.addEventListener("animationend", () => piece.remove(), { once: true });
        setTimeout(() => piece.remove(), (dur + delay) * 1000 + 100);
      }
    }

    function setupOptionButtons() {
      document.querySelectorAll("[data-field]").forEach(grid => {
        grid.addEventListener("click", e => {
          const btn = e.target.closest(".option-btn");
          if (!btn) return;
          const field = grid.dataset.field;
          grid.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          state[field] = btn.dataset.value;
          if (field === "format") {
            document.getElementById("sub-walk").style.display = state.format === "walk" ? "block" : "none";
            document.getElementById("sub-cinema").style.display = state.format === "cinema" ? "block" : "none";
            if (state.format === "walk") state.genre = null;
            if (state.format === "cinema") state.place = null;
            if (FORMATS_NO_DETAILS.includes(state.format)) {
              state.place = null;
              state.genre = null;
            }
          }
          hideFormError();
        });
      });
    }

    function updateFormDots() {
      formDots.querySelectorAll(".dot").forEach((dot, i) => dot.classList.toggle("active", i === formSubStep));
    }

    function showFormSubStep(step) {
      formSubStep = step;
      document.getElementById("form-step-format").style.display = step === 0 ? "block" : "none";
      document.getElementById("form-step-details").style.display = step === 1 ? "block" : "none";
      document.getElementById("form-step-datetime").style.display = step === 2 ? "block" : "none";
      document.getElementById("btn-form-next").textContent = step === 2 ? "Отправить" : "Дальше";
      updateFormDots();
      hideFormError();
    }

    function hideFormError() { formError.classList.remove("visible"); formError.textContent = ""; }
    function showFormError(msg) { formError.textContent = msg; formError.classList.add("visible"); }

    function getNextFormStep(fromStep) {
      if (fromStep === 0 && FORMATS_NO_DETAILS.includes(state.format)) return 2;
      return fromStep + 1;
    }

    function getPrevFormStep(fromStep) {
      if (fromStep === 2 && FORMATS_NO_DETAILS.includes(state.format)) return 0;
      return fromStep - 1;
    }

    function validateFormStep() {
      if (formSubStep === 0 && !state.format) {
        showFormError("Выбери формат свидания.");
        return false;
      }
      if (formSubStep === 1) {
        if (FORMATS_NO_DETAILS.includes(state.format)) return true;
        if (state.format === "walk" && !state.place) { showFormError("Выбери место для прогулки."); return false; }
        if (state.format === "cinema" && !state.genre) { showFormError("Выбери жанр фильма."); return false; }
      }
      if (formSubStep === 2) {
        const iso = getSelectedDate();
        const d = Number(document.getElementById("date-day").value);
        const m = Number(document.getElementById("date-month").value);
        if (!iso || !d || !m || m < 1 || m > 12 || d < 1 || d > 31) {
          showFormError("Укажи дату в формате ДД.ММ.");
          return false;
        }
        state.date = iso;
        state.time = getSelectedTime();
        state.comment = document.getElementById("input-comment").value.trim();
      }
      return true;
    }

    function formatDate(isoDate) {
      const [y, m, d] = isoDate.split("-").map(Number);
      return new Date(y, m - 1, d).toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });
    }

    function buildPayload() {
      return {
        format: state.format,
        formatLabel: LABELS.format[state.format],
        place: state.place,
        placeLabel: state.place ? LABELS.place[state.place] : null,
        genre: state.genre,
        genreLabel: state.genre ? LABELS.genre[state.genre] : null,
        date: state.date,
        dateLabel: formatDate(state.date),
        time: state.time,
        timeLabel: state.time,
        comment: state.comment || null,
        submittedAt: new Date().toISOString()
      };
    }

    function saveToStorage(payload) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch {}
    }

    function loadFromStorage() {
      try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
    }

    async function submitData(payload) {
      saveToStorage(payload);
      if (!SUBMIT_URL) return { ok: true };
      const res = await fetch(SUBMIT_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error("fail");
      return { ok: true };
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function renderSummary(payload) {
      const items = [{ label: "Формат", value: payload.formatLabel }];
      if (payload.placeLabel) items.push({ label: "Место", value: payload.placeLabel });
      if (payload.genreLabel) items.push({ label: "Жанр", value: payload.genreLabel });
      items.push({ label: "Дата", value: payload.dateLabel }, { label: "Время", value: payload.timeLabel });
      if (payload.comment) items.push({ label: "Пожелание", value: payload.comment });
      document.getElementById("summary").innerHTML = items.map(i =>
        `<div class="summary-item"><span class="summary-item__label">${i.label}</span><span class="summary-item__value">${escapeHtml(i.value)}</span></div>`
      ).join("");
    }

    function buildCopyText(p) {
      const lines = ["Ответ на приглашение", "", `Формат: ${p.formatLabel}`];
      if (p.placeLabel) lines.push(`Место: ${p.placeLabel}`);
      if (p.genreLabel) lines.push(`Жанр: ${p.genreLabel}`);
      lines.push(`Дата: ${p.dateLabel}`, `Время: ${p.timeLabel}`);
      if (p.comment) lines.push(`Пожелание: ${p.comment}`);
      lines.push("", "Жду наш вечер");
      return lines.join("\n");
    }

    async function copySummary() {
      const saved = loadFromStorage();
      if (!saved) return;
      const text = buildCopyText(saved);
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      }
      showToast("Скопировано!");
    }

    function resetAll() {
      Object.assign(state, { format: null, place: null, genre: null, date: "", time: "", comment: "" });
      timeHour = 19; timeMinute = 0; updateTimeDisplay();
      document.querySelectorAll(".option-btn.selected").forEach(b => b.classList.remove("selected"));
      document.getElementById("sub-walk").style.display = "none";
      document.getElementById("sub-cinema").style.display = "none";
      document.getElementById("date-day").value = "";
      document.getElementById("date-month").value = "";
      document.getElementById("input-comment").value = "";
      noMessage.classList.remove("visible");
      resetNoButton();
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      formSubStep = 0;
      showFormSubStep(0);
      showScreen("welcome");
    }

    function tryRestoreSaved() {
      const saved = loadFromStorage();
      if (!saved?.format) return;
      renderSummary(saved);
      showScreen("final");
    }

    function bindEvents() {
      document.getElementById("btn-next-welcome").addEventListener("click", () => showScreen("question"));
      document.getElementById("btn-back-question").addEventListener("click", () => {
        noMessage.classList.remove("visible");
        showScreen("welcome");
      });
      document.getElementById("btn-yes").addEventListener("click", () => {
        const btnYes = document.getElementById("btn-yes");
        launchConfetti(btnYes);
        setTimeout(() => {
          showScreen("form");
          showFormSubStep(0);
        }, 1200);
      });
      document.getElementById("btn-form-back").addEventListener("click", () => {
        if (formSubStep > 0) showFormSubStep(getPrevFormStep(formSubStep));
        else showScreen("question");
      });
      document.getElementById("btn-form-next").addEventListener("click", async () => {
        if (!validateFormStep()) return;
        if (formSubStep < 2) { showFormSubStep(getNextFormStep(formSubStep)); return; }
        const payload = buildPayload();
        const btn = document.getElementById("btn-form-next");
        btn.disabled = true; btn.textContent = "Отправляем…";
        try {
          await submitData(payload);
          renderSummary(payload);
          showScreen("final");
        } catch {
          renderSummary(payload);
          showScreen("final");
        } finally {
          btn.disabled = false; btn.textContent = "Отправить";
        }
      });
      document.getElementById("btn-copy").addEventListener("click", copySummary);
      document.getElementById("btn-reset").addEventListener("click", resetAll);
    }

    initBackground();
    initTimePicker();
    initNoButton();
    setupOptionButtons();
    bindEvents();
    tryRestoreSaved();
  </script>
</body>
</html>
